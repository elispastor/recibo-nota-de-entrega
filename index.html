<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía Digital - Talonario de Notas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #141E30, #243B55);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .container { 
            background: #ffffff; 
            border-radius: 24px; 
            box-shadow: 0 25px 40px rgba(0,0,0,0.25); 
            max-width: 650px; 
            width: 100%; 
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .header { 
            background: linear-gradient(135deg, #0057A3, #00A86B); 
            padding: 35px 25px; 
            text-align: center; 
            color: white; 
        }
        
        .logo-img {
            max-width: 100px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        
        .title { 
            font-size: 1.6rem; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            margin-top: 10px;
        }
        
        .nota-numero {
            font-size: 1rem;
            background: rgba(255,255,255,0.15);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-top: 12px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        
        .content { padding: 30px 25px; }
        
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #1F2A3A;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #00A86B;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,168,107,0.2);
        }
        
        .plans-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }
        .plan-btn {
            background: #F1F5F9;
            border: 2px solid #E2E8F0;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #1E293B;
            font-size: 0.85rem;
        }
        .plan-btn:hover {
            background: #E2E8F0;
            transform: translateY(-2px);
        }
        .plan-btn:active {
            transform: scale(0.96);
        }
        
        .item-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        .item-row input {
            flex: 2;
            padding: 10px 12px;
            border: 2px solid #E2E8F0;
            border-radius: 14px;
        }
        .item-price {
            flex: 1;
        }
        .btn-add-item {
            background: #00A86B;
            color: white;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0 15px 0;
            transition: 0.2s;
        }
        .btn-add-item:hover { background: #007A4D; transform: scale(1.02);}
        
        .total {
            background: linear-gradient(135deg, #0057A3, #00A86B);
            color: white;
            padding: 18px;
            border-radius: 20px;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin: 20px 0;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .btn-primary, .btn-wa {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: #141E30;
            color: white;
        }
        .btn-primary:hover { background: #1E2A3A; transform: translateY(-2px);}
        .btn-wa {
            background: #25D366;
            color: white;
        }
        .btn-wa:hover { background: #128C7E; transform: translateY(-2px);}
        
        .print-area { display: none; }
        @media print {
            .container { box-shadow: none; margin: 0; padding: 0; }
            .action-buttons, .btn-add-item, .plans-container { display: none; }
            .print-area { display: block !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">📋 Guía Digital · Talonario</div>
        <div class="nota-numero">NOTA N° <span id="numero-actual">1000</span></div>
    </div>
    
    <div class="content">
        <div class="form-group">
            <label>🧑 Cliente</label>
            <input type="text" id="cliente" placeholder="Nombre del cliente">
        </div>
        <div class="form-group">
            <label>📞 Teléfono (para enviar)</label>
            <input type="tel" id="telefono" placeholder="Número con código país, ej: 573244913371">
        </div>
        <div class="form-group">
            <label>📅 Fecha</label>
            <input type="date" id="fecha">
        </div>
        
        <label>🎯 Planes rápidos</label>
        <div class="plans-container">
            <button type="button" class="plan-btn" data-plan="Plan Básico - $50.000">Plan Básico ($50k)</button>
            <button type="button" class="plan-btn" data-plan="Plan Pro - $120.000">Plan Pro ($120k)</button>
            <button type="button" class="plan-btn" data-plan="Plan Elite - $250.000">Plan Elite ($250k)</button>
            <button type="button" class="plan-btn" data-plan="Plan Elite Plus - $500.000">Plan Elite Plus ($500k)</button>
        </div>
        
        <h3 style="margin: 15px 0 8px 0;">🛒 Concepto / Items</h3>
        <div id="items-container">
            <div class="item-row">
                <input type="text" class="item-desc" placeholder="Concepto (ej: Publicidad en Guía)">
                <input type="number" class="item-price" placeholder="Valor" value="0">
            </div>
        </div>
        <button class="btn-add-item" onclick="addItem()">+ Agregar otro</button>
        
        <div class="total" id="total-preview">$0</div>
        
        <div class="form-group">
            <label>✏️ Observaciones</label>
            <textarea id="observaciones" rows="2" placeholder="Notas adicionales, condiciones, etc."></textarea>
        </div>
        
        <div class="action-buttons">
            <button class="btn-primary" onclick="generarNota()"><i class="fas fa-print"></i> Imprimir</button>
            <button class="btn-wa" onclick="enviarWhatsApp()"><i class="fab fa-whatsapp"></i> Enviar al Cliente</button>
        </div>
    </div>
    <div class="print-area" id="print-area"></div>
</div>

<script>
    // ----- Sistema de numeración automática -----
    let numeroNota = localStorage.getItem('numeroNotaGuia') ? parseInt(localStorage.getItem('numeroNotaGuia')) : 1000;
    
    function actualizarNumeroDisplay() {
        document.getElementById('numero-actual').innerText = numeroNota;
    }
    
    function incrementarNumero() {
        numeroNota++;
        localStorage.setItem('numeroNotaGuia', numeroNota);
        actualizarNumeroDisplay();
    }
    
    // Fecha actual por defecto
    document.addEventListener('DOMContentLoaded', () => {
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fecha').value = hoy;
        actualizarNumeroDisplay();
        calcularTotal();
        
        // Evento para botones de planes
        document.querySelectorAll('.plan-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const planText = btn.getAttribute('data-plan');
                // Extraer nombre y precio
                const match = planText.match(/^(.*) - \$([0-9.]+)/);
                if(match) {
                    const desc = match[1].trim();
                    const price = parseFloat(match[2].replace(/\./g, ''));
                    if(!isNaN(price)) {
                        addItem(desc, price);
                    }
                }
            });
        });
    });
    
    function addItem(descripcion = '', precio = 0) {
        const container = document.getElementById('items-container');
        const newRow = document.createElement('div');
        newRow.className = 'item-row';
        newRow.innerHTML = `
            <input type="text" class="item-desc" placeholder="Concepto" value="${descripcion.replace(/"/g, '&quot;')}">
            <input type="number" class="item-price" placeholder="Valor" value="${precio}" onchange="calcularTotal()">
            <button onclick="removeItem(this)" style="background:#dc3545; color:white; border:none; border-radius:40px; width:30px; height:30px; cursor:pointer;">✖</button>
        `;
        container.appendChild(newRow);
        calcularTotal();
    }
    
    function removeItem(btn) {
        btn.parentElement.remove();
        calcularTotal();
    }
    
    function calcularTotal() {
        let total = 0;
        document.querySelectorAll('.item-price').forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('total-preview').innerHTML = `$${total.toLocaleString()}`;
        return total;
    }
    
    // Obtener objeto nota completo
    function getNotaData() {
        const cliente = document.getElementById('cliente').value || "Cliente no especificado";
        const fecha = document.getElementById('fecha').value;
        const observaciones = document.getElementById('observaciones').value;
        let itemsHTML = '';
        let total = 0;
        let itemsList = [];
        document.querySelectorAll('.item-row').forEach(row => {
            const desc = row.querySelector('.item-desc').value;
            const precio = parseFloat(row.querySelector('.item-price').value) || 0;
            if(desc.trim() !== "") {
                itemsHTML += `<tr><td style="padding:8px; border-bottom:1px solid #ddd;">${desc}</td><td style="text-align:right; padding:8px;">$${precio.toLocaleString()}</td></tr>`;
                itemsList.push({ desc, precio });
                total += precio;
            }
        });
        if(itemsList.length === 0) {
            itemsHTML = `<tr><td colspan="2" style="padding:15px; text-align:center;">Sin items registrados</td></tr>`;
        }
        return { cliente, fecha, observaciones, itemsHTML, total, itemsList };
    }
    
    function generarNota() {
        const { cliente, fecha, observaciones, itemsHTML, total } = getNotaData();
        const tipo = "NOTA DE SERVICIO / PEDIDO";
        const numero = numeroNota;
        
        const printContent = `
            <div style="max-width: 550px; margin: 0 auto; padding: 30px; font-family: 'Segoe UI', Arial, sans-serif; background: white;">
                <div style="text-align: center; border-bottom: 3px solid #00A86B; padding-bottom: 15px; margin-bottom: 25px;">
                    <h1 style="color: #0057A3; margin:0;">GUÍA DIGITAL</h1>
                    <p style="font-size: 1.2rem; margin:5px 0;">${tipo}</p>
                    <p><strong>N° ${numero}</strong></p>
                </div>
                <p><strong>Cliente:</strong> ${cliente}</p>
                <p><strong>Fecha:</strong> ${fecha.replace(/-/g, '/')}</p>
                <table style="width:100%; border-collapse: collapse; margin: 20px 0;">
                    <thead><tr style="background:#f1f1f1;"><th style="padding:10px; text-align:left;">Concepto</th><th style="padding:10px; text-align:right;">Valor</th></tr></thead>
                    <tbody>${itemsHTML}</tbody>
                </table>
                <div style="background:#e9f5ef; padding:12px; border-radius:12px; text-align:right; font-size:1.4rem; font-weight:800;">Total: $${total.toLocaleString()}</div>
                ${observaciones ? `<p style="margin-top:20px;"><strong>Observaciones:</strong> ${observaciones}</p>` : ''}
                <div style="margin-top: 30px; text-align: center; font-size: 0.75rem; color: gray; border-top: 1px dashed #ccc; padding-top: 15px;">
                    ✅ Documento generado por Guía Digital · Eli Suárez<br>
                    📱 WhatsApp: <a href="https://wa.me/573244913371">+57 324 4913371</a>
                </div>
            </div>
        `;
        document.getElementById('print-area').innerHTML = printContent;
        window.print();
        incrementarNumero();
        calcularTotal();
    }
    
    function enviarWhatsApp() {
        const telefonoCliente = document.getElementById('telefono').value.trim();
        if(!telefonoCliente) {
            alert("⚠️ Por favor ingresa el número de teléfono del cliente (campo Teléfono).");
            return;
        }
        const { cliente, fecha, observaciones, total, itemsList } = getNotaData();
        const numero = numeroNota; // Número actual antes de imprimir
        // Construir mensaje amigable
        let itemsTxt = "";
        itemsList.forEach(item => {
            itemsTxt += `▸ ${item.desc}: $${item.precio.toLocaleString()}\n`;
        });
        if(itemsTxt === "") itemsTxt = "▸ Sin items detallados.\n";
        
        const mensaje = `🧾 *GUÍA DIGITAL - NOTA #${numero}* 🧾\n\n👤 *Cliente:* ${cliente}\n📅 *Fecha:* ${fecha.replace(/-/g, '/')}\n\n*📌 CONCEPTOS:*\n${itemsTxt}\n💰 *TOTAL:* $${total.toLocaleString()}\n\n${observaciones ? `✏️ *Observaciones:* ${observaciones}\n\n` : ''}✅ *Documento de validez para servicios de Guía Digital.*\n📱 Eli Suárez - www.guia-digital.com`;
        
        const urlWA = `https://wa.me/${telefonoCliente}?text=${encodeURIComponent(mensaje)}`;
        window.open(urlWA, '_blank');
        // Opcional: también incrementar número cuando se envía por WhatsApp?
        // Preguntaremos al usuario si desea aumentar el correlativo al enviar.
        if(confirm("¿Deseas aumentar el número consecutivo para la próxima nota? Esto mantendrá el control de tus documentos.")) {
            incrementarNumero();
            calcularTotal();
        }
    }
</script>
</body>
</html>
